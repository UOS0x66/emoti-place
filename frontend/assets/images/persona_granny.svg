    <path d="M238 204 Q244 201 248 206" stroke="#a07040" stroke-width="1.1" fill="none" opacity="0.42"/>
    <path d="M238 209 Q244 208 249 212" stroke="#a07040" stroke-width="0.9" fill="none" opacity="0.35"/>
