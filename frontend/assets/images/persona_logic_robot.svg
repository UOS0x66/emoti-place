<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgRobot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050f1a"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8ab4c8"/>
      <stop offset="60%" stop-color="#4a7a9b"/>
      <stop offset="100%" stop-color="#2a4a60"/>
    </radialGradient>
    <radialGradient id="screenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#003344" stop-opacity="0.9"/>
